{% extends "base.html" %}
{% block title %}Login — Event Photo Finder{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:440px;">
    <div class="text-center mb-4">
        <div class="fs-1 text-primary mb-2"><i class="bi bi-person-circle"></i></div>
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p class="text-muted">Log in to find your event photos</p>
    </div>
    <div class="card p-4">
        <form method="post">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="you@example.com" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Log In
            </button>
        </form>
    </div>
    <p class="text-center mt-3 text-muted small">
        Don't have an account?
        <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Register here</a>
    </p>
    <p class="text-center text-muted small">
        Are you an admin?
        <a href="{{ url_for('admin_login') }}" class="text-warning fw-semibold">Admin login</a>
    </p>
</div>
{% endblock %}
