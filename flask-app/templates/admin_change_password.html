{% extends "base.html" %}
{% block title %}Change Admin Password{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px;">
    <div class="section-label">Admin Panel</div>
    <h2 class="fw-bold mb-1">Change Password</h2>
    <p class="text-muted mb-4">Update your admin password. Use a strong, unique password.</p>
    <div class="card p-4">
        <form method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Current Password</label>
                <input type="password" class="form-control" name="current_password" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">New Password</label>
                <input type="password" class="form-control" name="new_password" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Confirm New Password</label>
                <input type="password" class="form-control" name="confirm_password" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary fw-semibold">
                    <i class="bi bi-key me-1"></i>Update Password
                </button>
                <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
