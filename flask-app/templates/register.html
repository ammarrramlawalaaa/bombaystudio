{% extends "base.html" %}
{% block title %}Register — Bombay Studio{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px;">
    <div class="text-center mb-4">
        <div class="fs-1 text-primary mb-2"><i class="bi bi-person-plus-fill"></i></div>
        <h2 class="fw-bold mb-1">Create an account</h2>
        <p class="text-muted">Register to find your event photos</p>
    </div>
    <div class="card p-4">
        <form method="post">
            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Full Name</label>
                <input type="text" class="form-control" id="name" name="name"
                       placeholder="Jane Smith" required autofocus>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                <i class="bi bi-person-check me-2"></i>Create Account
            </button>
        </form>
    </div>
    <p class="text-center mt-3 text-muted small">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Log in</a>
    </p>
</div>
{% endblock %}
